<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
        <div class="page-header">
            <div>
                <h2>Supports de Cours & Devoirs</h2>
                <p>Gérez vos publications par classe</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Mes Classes Assignées</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Classe</th>
                            <th>Matière</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="aff : ${affectations}">
                            <td th:text="${classeNames.get(aff.classeId)}">Classe</td>
                            <td th:text="${matiereNames.get(aff.matiereId)}">Matière</td>
                            <td>
                                <a th:href="@{/professeur/devoirs/details(affectationId=${aff.id})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-folder-open"></i> Voir supports
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
