<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div><h2>Profil de l'Étudiant</h2><p><a th:href="@{/directeur/etudiants}" style="cursor:pointer;color:var(--g);">← Retour à la liste</a></p></div>
        <button class="btn btn-secondary"><i class="fas fa-edit"></i> Modifier</button>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-body" style="text-align:center;padding:var(--sp-2xl);">
            <div class="prof-card-avatar" style="background:linear-gradient(135deg,var(--g),var(--b));width:100px;height:100px;font-size:36px;margin:0 auto var(--sp-lg);">ET</div>
            <h3 style="font-family:var(--font-display);font-size:22px;">Chargement...</h3>
            <div style="color:var(--g);font-weight:600;font-size:14px;margin:var(--sp-sm) 0;">-</div>
            <div style="display:flex;justify-content:center;gap:var(--sp-sm);margin-top:var(--sp-sm);">
              <span class="badge badge-green">Actif</span>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Informations</h3></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Matricule</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Date de naissance</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Lieu de naissance</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Sexe</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Contact</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Email</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Région</div><strong>-</strong></div>
              <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Nationalité</div><strong>-</strong></div>
            </div>
          </div>
        </div>
      </div>
      <div class="card" style="margin-top:var(--sp-xl);">
        <div class="card-header"><h3>Scolarité</h3></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp-md);">
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Classe actuelle</div><strong>-</strong></div>
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Niveau</div><strong>-</strong></div>
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Année scolaire</div><strong>-</strong></div>
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Statut</div><strong>-</strong></div>
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Type d'inscription</div><strong>-</strong></div>
            <div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px;">Date d'inscription</div><strong>-</strong></div>
          </div>
        </div>
      </div>
  </main>
</div>
<script th:inline="javascript">
  const etudiantId = /*[[${etudiantId}]]*/ null;
  
  document.addEventListener('DOMContentLoaded', async () => {
    if (etudiantId) {
      try {
        const res = await fetch(`/api/directeur/etudiants/${etudiantId}`);
        if (res.ok) {
          const data = await res.json();
          // Mettre à jour les informations
          document.querySelector('.prof-card-avatar').textContent = 
            (data.nom ? data.nom[0] : '') + (data.prenom ? data.prenom[0] : '');
          document.querySelector('h3').textContent = `${data.nom} ${data.prenom}`;
          document.querySelectorAll('.card-body strong').forEach((el, i) => {
            const values = [
              data.matricule || '-',
              data.dateNaissance ? new Date(data.dateNaissance).toLocaleDateString('fr-MG') : '-',
              data.lieuNaissance || '-',
              data.sexe === 'M' ? 'Masculin' : data.sexe === 'F' ? 'Féminin' : '-',
              data.telephone || '-',
              data.email || '-',
              data.region || '-',
              data.nationalite || '-',
              data.classeNom || '-',
              data.niveauLibelle || '-',
              data.anneeLibelle || '-',
              data.statutInscription || '-',
              data.typeInscription || '-',
              data.dateInscription ? new Date(data.dateInscription).toLocaleDateString('fr-MG') : '-'
            ];
            if (values[i]) el.textContent = values[i];
          });
        }
      } catch (e) {
        console.error('Erreur chargement étudiant:', e);
      }
    }
  });
</script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
