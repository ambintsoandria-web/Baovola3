spring.application.name=ecole
server.port=1234

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/lycee1
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# LOGGING POUR VOIR LES ERREURS DÉTAILLÉES
# ============================================================
# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging niveau DEBUG pour tout voir
logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.ecole=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Pour voir les erreurs complètes dans la console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n