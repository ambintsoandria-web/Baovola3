# ==========================================
# Application
# ==========================================
spring.application.name=ecole
server.port=4040

# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5433/gisdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=60000

# ==========================================
# JPA Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging pour voir les erreurs SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# THYMELEAF - CONFIGURATION POUR VOIR LES ERREURS
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ==========================================
# ACTIVER L'AFFICHAGE DES ERREURS DÉTAILLÉES (Whitelabel page complète)
# ==========================================
server.error.whitelabel.enabled=true
server.error.path=/error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
server.error.include-path=always

# ==========================================
# Spring Boot DEV MODE
# ==========================================
spring.main.allow-circular-references=true
spring.mvc.log-resolved-exception=true
spring.mvc.log-request-details=true

# ==========================================
# Logging TRACE pour Thymeleaf
# ==========================================
logging.level.org.thymeleaf=TRACE
logging.level.org.thymeleaf.spring5=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG