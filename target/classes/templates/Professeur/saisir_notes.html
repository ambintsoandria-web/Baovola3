<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div>
          <h2>Saisir des Notes</h2>
          <p th:text="${classe != null and matiere != null ? classe.nom + ' - ' + matiere.nom : 'Saisie de notes'}">Classe - Matière</p>
        </div>
        <div class="page-header-actions">
          <a th:href="@{/professeur/notes/classe/{classeId}(classeId=${classeId})}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Retour
          </a>
        </div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <h3>Informations de l'évaluation</h3>
      </div>
      <div class="card-body">
        <form th:action="@{/professeur/saisir_notes}" method="post" id="notesForm">
          <input type="hidden" name="affectationId" th:value="${affectationId}"/>
          <input type="hidden" name="classeId" th:value="${classeId}"/>
          
          <div class="form-row">
            <div class="form-group">
              <label>Type d'évaluation *</label>
              <select name="typeEvaluation" class="form-control" required>
                <option value="">Sélectionner...</option>
                <option value="devoir_1">Devoir 1</option>
                <option value="devoir_2">Devoir 2</option>
                <option value="interrogation">Interrogation</option>
                <option value="composition">Composition</option>
                <option value="examen_blanc">Examen blanc</option>
                <option value="oral">Oral</option>
                <option value="tp">TP</option>
              </select>
            </div>
            <div class="form-group">
              <label>Période *</label>
              <select name="periodeId" class="form-control" required>
                <option value="">Sélectionner...</option>
                <option th:each="periode : ${periodes}" 
                        th:value="${periode.id}" 
                        th:text="${periode.libelle}">Période</option>
              </select>
            </div>
            <div class="form-group">
              <label>Barème *</label>
              <input type="number" name="sur" class="form-control" value="20" min="1" required step="0.5"/>
            </div>
          </div>
          
          <div class="form-group">
            <label>Commentaire (optionnel)</label>
            <textarea name="commentaire" class="form-control" rows="2" placeholder="Commentaire général sur l'évaluation..."></textarea>
          </div>
          
          <div class="card" style="margin-top: 20px;">
            <div class="card-header">
              <h3>Notes des élèves</h3>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Élève</th>
                    <th>Matricule</th>
                    <th>Note *</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="inscription : ${inscriptions}">
                    <td>
                      <strong th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom + ' ' + etudiantProfiles.get(inscription.etudiantId).prenom : 'Étudiant'}">Nom Prénom</strong>
                    </td>
                    <td th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">Matricule</td>
                    <td>
                      <input type="hidden" 
                             th:name="'etudiantIds'" 
                             th:value="${inscription.etudiantId}"/>
                      <input type="number" 
                             th:name="'valeurs'" 
                             class="form-control" 
                             min="0" 
                             step="0.5"
                             placeholder="Note"
                             style="width:100px;padding:6px;text-align:center;"/>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="form-actions" style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Enregistrer les notes
            </button>
            <a th:href="@{/professeur/notes/classe/{classeId}(classeId=${classeId})}" class="btn btn-secondary">
              Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
document.getElementById('notesForm').addEventListener('submit', function(e) {
  const notes = document.querySelectorAll('input[name="valeurs"]');
  let hasValue = false;
  
  notes.forEach(note => {
    if (note.value && note.value.trim() !== '') {
      hasValue = true;
    }
  });
  
  if (!hasValue) {
    e.preventDefault();
    alert('Veuillez saisir au moins une note.');
  }
});
</script>
</body>
</html>
