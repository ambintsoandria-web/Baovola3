<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar"                th:replace="~{fragments/header :: topbar}"></header>
  <main class="main-content">

    <!-- En-tête -->
    <div class="page-header">
      <div>
        <h2>Étudiants</h2>
        <p id="result-count">Chargement…</p>
      </div>
      <div style="display:flex;gap:var(--sp-sm);">
        <button class="btn" id="btn-toggle-filters"
                style="background:var(--surf2);color:var(--txt);border:1px solid var(--border);">
          <i class="fas fa-sliders-h"></i> Filtres
        </button>
      </div>
    </div>

    <!-- Compteurs rapides -->
    <div class="stats-grid" style="margin-bottom:var(--sp-lg);">
      <div class="stat-card teal">
        <div class="stat-icon teal"><i class="fas fa-user-graduate"></i></div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total trouvés</div>
      </div>
      <div class="stat-card violet">
        <div class="stat-icon violet"><i class="fas fa-check-circle"></i></div>
        <div class="stat-value" id="stat-page">—</div>
        <div class="stat-label">Sur cette page</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-icon amber"><i class="fas fa-file-alt"></i></div>
        <div class="stat-value" id="stat-pages">—</div>
        <div class="stat-label">Pages</div>
      </div>
    </div>

    <!-- ============================================================
         PANNEAU DE FILTRES (masqué par défaut)
    ============================================================ -->
    <div class="card" id="filter-panel" style="margin-bottom:var(--sp-lg);display:none;">
      <div class="card-header">
        <h3><i class="fas fa-filter"></i> Critères de recherche</h3>
        <button class="btn" id="btn-reset"
                style="background:rgba(255,59,92,.08);color:var(--danger);border:1px solid var(--danger);font-size:0.8rem;">
          <i class="fas fa-undo"></i> Réinitialiser
        </button>
      </div>
      <div class="card-body" style="padding:var(--sp-lg);">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;">

          <!-- Recherche libre -->
          <div style="grid-column:span 2;">
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">
              RECHERCHE LIBRE
            </label>
            <div style="position:relative;">
              <i class="fas fa-search" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--txt3);"></i>
              <input id="f-recherche" type="text" class="form-control"
                     style="padding-left:2.2rem;" placeholder="Nom, prénom, matricule…">
            </div>
          </div>

          <!-- Sexe -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">SEXE</label>
            <select id="f-sexe" class="form-control">
              <option value="">Tous</option>
              <option value="M">Masculin</option>
              <option value="F">Féminin</option>
            </select>
          </div>

          <!-- Région -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">RÉGION</label>
            <input id="f-region" type="text" class="form-control" placeholder="Ex : Analamanga">
          </div>

          <!-- Niveau -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">NIVEAU</label>
            <select id="f-niveau" class="form-control">
              <option value="">Tous</option>
            </select>
          </div>

          <!-- Classe -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">CLASSE</label>
            <select id="f-classe" class="form-control">
              <option value="">Toutes</option>
            </select>
          </div>

          <!-- Année scolaire -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">ANNÉE SCOLAIRE</label>
            <select id="f-annee" class="form-control">
              <option value="">Toutes</option>
            </select>
          </div>

          <!-- Statut inscription -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">STATUT</label>
            <select id="f-statut" class="form-control">
              <option value="">Tous</option>
            </select>
          </div>

          <!-- Date inscription : borne début -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">INSCRIPTION APRÈS</label>
            <input id="f-insc-debut" type="date" class="form-control">
          </div>

          <!-- Date inscription : borne fin -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">INSCRIPTION AVANT</label>
            <input id="f-insc-fin" type="date" class="form-control">
          </div>

          <!-- Date naissance : borne début -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">NÉ(E) APRÈS</label>
            <input id="f-naiss-debut" type="date" class="form-control">
          </div>

          <!-- Date naissance : borne fin -->
          <div>
            <label style="display:block;margin-bottom:0.4rem;font-size:0.82rem;font-weight:600;color:var(--txt2);">NÉ(E) AVANT</label>
            <input id="f-naiss-fin" type="date" class="form-control">
          </div>

          <!-- Archivés -->
          <div style="display:flex;align-items:center;gap:0.5rem;padding-top:1.4rem;">
            <input type="checkbox" id="f-archives" style="width:18px;height:18px;accent-color:var(--g);">
            <label for="f-archives" style="margin:0;font-size:0.88rem;">Inclure les archivés</label>
          </div>

        </div><!-- grid -->

        <!-- Pills des filtres actifs -->
        <div class="filter-pills" id="filter-pills" style="margin-top:1rem;min-height:24px;"></div>

      </div><!-- card-body -->
    </div><!-- filter-panel -->

    <!-- ============================================================
         TABLEAU RÉSULTATS
    ============================================================ -->
    <div class="card">
      <div class="card-header" style="justify-content:space-between;">
        <h3><i class="fas fa-list"></i> Résultats</h3>
        <div style="display:flex;gap:0.75rem;align-items:center;">
          <!-- Tri -->
          <select id="f-sort-by" class="form-control" style="width:auto;font-size:0.82rem;">
            <option value="nom">Trier par nom</option>
            <option value="prenom">Trier par prénom</option>
            <option value="matricule">Trier par matricule</option>
            <option value="dateNaissance">Trier par naissance</option>
          </select>
          <select id="f-sort-dir" class="form-control" style="width:auto;font-size:0.82rem;">
            <option value="asc">↑ Croissant</option>
            <option value="desc">↓ Décroissant</option>
          </select>
          <!-- Taille page -->
          <select id="f-page-size" class="form-control" style="width:auto;font-size:0.82rem;">
            <option value="10">10 / page</option>
            <option value="15" selected>15 / page</option>
            <option value="25">25 / page</option>
            <option value="50">50 / page</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="result-table">
          <thead>
            <tr>
              <th>Matricule</th>
              <th>Nom &amp; Prénom</th>
              <th>Date de naissance</th>
              <th>Sexe</th>
              <th>Région</th>
              <th>Classe</th>
              <th>Niveau</th>
              <th>Année</th>
              <th>Statut</th>
              <th>Inscrit le</th>
            </tr>
          </thead>
          <tbody id="result-tbody">
            <tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--txt3);">
              <i class="fas fa-spinner fa-spin"></i> Chargement…
            </td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div style="display:flex;justify-content:space-between;align-items:center;
                  padding:1rem var(--sp-lg);border-top:1px solid var(--border);">
        <span id="pagination-info" style="color:var(--txt2);font-size:0.85rem;"></span>
        <div style="display:flex;gap:0.5rem;" id="pagination-controls"></div>
      </div>
    </div>

  </main>
</div>

<script th:src="@{/js/directeur-js/etudiants/EtudiantsFiltre.js}" defer></script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
