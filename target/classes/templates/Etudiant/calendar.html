<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head"></head>

<body>
  <canvas id="particle-canvas"></canvas>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
    <header class="topbar" th:replace="fragments/header :: topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>Mon Emploi du Temps</h2>
          <p th:text="${profilEtudiant != null ? profilEtudiant.prenom + ' ' + profilEtudiant.nom : ''}"></p>
        </div>
      </div>
      <div class="card">
        <div class="card-body" style="padding:var(--sp-md);">
          <div class="schedule-grid">
            <!-- En-tête -->
            <div class="schedule-header">Heure</div>
            <div class="schedule-header" th:each="jour : ${jours}" th:text="${jour}"></div>

            <!-- Lignes pour chaque horaire -->
            <div th:each="horaire : ${horaires}" th:remove="tag">
              <div class="schedule-cell schedule-time" th:text="${horaire.libelle}"></div>

              <div th:each="jourIndex : ${#numbers.sequence(0, 4)}" class="schedule-cell">
                <div th:each="cours : ${emploiDuTemps}"
                  th:if="${cours != null and cours.jourSemaine == jourIndex + 1 and cours.heureDebut == horaire.heureDebut}"
                  class="schedule-class math">
                  <span th:text="${cours.matiereNom}"></span>
                  <small th:text="${cours.professeurComplet}"></small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
