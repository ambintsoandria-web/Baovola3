<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div><h2>Mes Notes</h2><p>Trimestre 2 — 2025/2026</p></div>
        <select class="form-control" style="width:auto;padding:8px 12px;"><option>Trimestre 2</option><option>Trimestre 1</option></select>
    </div>
    <div class="stats-grid" style="margin-bottom:var(--sp-xl);">
      <div class="stat-card amber"><div class="stat-icon amber"><i class="fas fa-star"></i></div><div class="stat-value">14.12</div><div class="stat-label">Moyenne générale</div></div>
      <div class="stat-card teal"><div class="stat-icon teal"><i class="fas fa-trophy"></i></div><div class="stat-value">1er</div><div class="stat-label">Rang dans la classe</div></div>
      <div class="stat-card violet"><div class="stat-icon violet"><i class="fas fa-chart-line"></i></div><div class="stat-value">+1.3</div><div class="stat-label">Progression vs T1</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Détail par matière</h3></div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Matière</th><th>Professeur</th><th>Note /20</th><th>Coeff.</th><th>Appréciation</th></tr></thead>
          <tbody>
            <tr th:each="note : ${notes}">
              <td th:text="${note.affectation?.matiere?.nom}">Mathématiques</td>
              <td th:text="${note.affectation?.professeur?.prenom + ' ' + note.affectation?.professeur?.nom}">Prof. Rabe</td>
              <td th:text="${note.valeur}">15.5</td>
              <td>5</td>
              <td style="color:var(--success);font-size:13px;">Très bien ⭐</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
