<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head"></head>

<body>
  <canvas id="particle-canvas"></canvas>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
    <header class="topbar" th:replace="fragments/header :: topbar"></header>
    <main class="main-content">
      <div class="page-header">
        <form th:action="@{/etudiant/notes}">
          <label for="trimestre">Trimestre:</label>
          <select id="trimestre" name="trimestre">
            <option th:each="periodes : ${periode}" th:value="${periodes.id}" th:text="${periodes.libelle}">
            </option>
          </select>
          <button type="submit">Valider</button>
        </form>

      </div>

      <div class="card">
        <div class="card-header">
          <h3>Détail par matière</h3>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Matière</th>
                <th>Professeur</th>
                <th>Note /20</th>
                <th>Coeff.</th>
                <th>Appréciation</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="note : ${notes}">
                <td th:text="${note.affectation?.matiere?.nom}"></td>
                <td th:text="${note.affectation?.professeur?.prenom + ' ' + note.affectation?.professeur?.nom}"></td>
                <td th:text="${note.valeur}"></td>
                <td th:text="${coefficientsMap[note.affectation?.matiere?.id]}"></td>
                <td th:text="${
    note.valeur < 10 ? 'Insuffisant' :
    note.valeur < 12 ? 'Augmentez vos efforts' :
    note.valeur < 16 ? 'Bien' :
    'Excellent ⭐'
}">
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
